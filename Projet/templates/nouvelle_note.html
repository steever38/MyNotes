<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Créer une nouvelle note</title>
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='CSS/style-nouvelle-note.css') }}">
</head>
<body>
    <header>
      <h1>Créer une nouvelle note pour la classe {{ classe }}</h1>
      <form action="/deconnexion" method="POST">
        <button type="submit" id="deconnexion">
            <img src="{{ url_for('static', filename='images/logout.svg') }}" alt="image" style="width: 20px; height: 20px; margin-right: 10px;">
            Deconnexion
        </button>
    </form>
    </header>
    <div class="form-container">
      {% if erreur %}
        <p style="color: red;">{{ erreur }}</p>
      {% endif %}
      <form action="{{ url_for('nouvelle_note') }}" method="POST">
        <label for="nom_note">📙 Nom de l'évaluation :</label>
        <input type="text" id="nom_note" name="nom_note" required pattern="[^_]*" title="Le caractère '_' n'est pas autorisé.">        
        
        <label for="date_note">📅 Date de l'évaluation :</label>
        <input type="date" id="date_note" name="date_note" required>
        
        <label for="coefficient">⚖️ Coefficient :</label>
        <input type="number" id="coefficient" name="coefficient" min="0" max="100" step="0.01" required>
        
        <input type="hidden" name="classe" value="{{ classe }}">
        <button type="submit">Créer la nouvelle note</button>
      </form>
      <a class="back-link" href="{{ url_for('professeur_notes', classe=classe) }}" style="color: black">Retour aux notes</a>
    </div>
  </body>
